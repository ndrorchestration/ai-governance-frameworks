name: Validate Policy Artifacts

on:
  push:
    branches: [ policy-artifact-materialization ]
  pull_request:
    branches: [ policy-artifact-materialization ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install validator requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/validators/requirements.txt
      - name: Run validators
        run: |
          python tools/validators/row_validator.py
